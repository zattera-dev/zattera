name: build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make cross
      - name: assert cli_only binary is small and daemon-free
        run: |
          size=$(stat -c%s dist/zattera-darwin-arm64)
          echo "cli_only size: $size bytes"
          test "$size" -lt 31457280  # 30 MB
          GOOS=linux GOARCH=amd64 go build -tags cli_only -o /tmp/zattera-cli ./cmd/zattera
          if go tool nm /tmp/zattera-cli 2>/dev/null | grep -q 'internal/daemon'; then
            echo "cli_only binary contains daemon symbols" && exit 1
          fi
