# Fixture: stateful service from a pre-built image with a pinned volume
# (exercises F16: stateful semantics, volume mounts, pre-snapshot hooks).
[app]
name = "postgres-demo"

[build]
type = "image"
image = "postgres:17-alpine"

[env.staging]
replicas = { min = 1, max = 1 }
stateful = true

[[env.staging.volumes]]
name = "pg-data"
mount = "/var/lib/postgresql/data"

[env.staging.snapshot]
schedule = "0 3 * * *"
pre_hook = "pg_dump -U postgres -f /var/lib/postgresql/data/predump.sql postgres"
