syntax = "proto3";

// Control-plane ↔ node contracts. These services are mTLS-only (node
// certificates, SAN "node:<id>") and are never exposed through the REST
// gateway.
//
// Direction matters:
//   - AgentSyncService and JoinService are served by CONTROL nodes; agents
//     dial out (works behind NAT before the mesh is up — Join uses the public
//     TLS endpoint, Sync uses the mesh once up, 127.0.0.1 in single-node).
//   - AgentLocalService is served by EVERY node on its mesh IP; control dials
//     it over the mesh for logs/exec/stats/builds/volume ops fan-out.

package zattera.cluster.v1;

import "google/protobuf/timestamp.proto";
import "zattera/v1/common.proto";
import "zattera/v1/deploy.proto";
import "zattera/v1/logs.proto";
import "zattera/v1/metrics.proto";
import "zattera/cluster/v1/mesh.proto";
import "zattera/v1/node.proto";
import "zattera/v1/service.proto";
import "zattera/v1/volume.proto";

// ---------------------------------------------------------------------------
// Join (bootstrap; token-authenticated, not yet mTLS)
// ---------------------------------------------------------------------------

service JoinService {
  rpc Join(JoinRequest) returns (JoinResponse);
}

message JoinRequest {
  string token_secret = 1; // the <secret> part of the join token
  string node_name = 2;
  repeated zattera.v1.NodeRole requested_roles = 3;
  string wireguard_public_key = 4;
  uint32 wireguard_listen_port = 5;
  repeated string public_endpoints = 6; // self-detected "ip:port", may be empty (NAT)
  map<string, string> detected_labels = 7;
  zattera.v1.ResourceLimits capacity = 8;
  uint32 capacity_disk_mb = 9;
  string os_arch = 10;
  string binary_version = 11;
  // CSR (PEM, PKCS#10) for the node's mTLS certificate. The control plane
  // signs it with the cluster CA and returns the certificate.
  bytes csr_pem = 12;
  // existing_node_id, when set, is this node's id from a prior join: a
  // restarting node re-enrolls under the same identity so it resumes its node
  // record (and mesh IP) instead of registering a duplicate. Empty on first join.
  string existing_node_id = 13;
}

message JoinResponse {
  string node_id = 1;
  string mesh_ip = 2;        // "" when mesh is disabled (single-node)
  bytes ca_cert_pem = 3;
  bytes node_cert_pem = 4;
  PeerSet initial_peers = 5;
  string control_grpc_addr = 6;   // where to open AgentSync (mesh IP or 127.0.0.1)
  string registry_addr = 7;       // embedded registry endpoint
  string registry_username = 8;
  string registry_password = 9;   // node registry credential (basic auth)
  bool mesh_enabled = 10;
  // The roles the control plane assigned this node (from the join token). A
  // node with the CONTROL role brings up its own raft + control stack; others
  // run as workers. Authoritative over local config.
  repeated zattera.v1.NodeRole roles = 11;

  // --- Control-node handover (populated only for CONTROL joins, T-55) --------
  // These carry cluster secrets over the already-mTLS join hop so a joining
  // control node comes up fully autonomous (auto-unseal within a live cluster,
  // spec §2.10) without the recovery passphrase.
  bytes data_key = 12;            // plaintext cluster data key (secret sealing)
  uint32 data_key_version = 13;   // its key version
  bytes ca_key_pem = 14;          // root CA private key (PEM) — every control node signs
  // raft_bind_addr is the address the joining control node must bind for the
  // raft transport (its mesh IP + raft port). The leader AddVoters this exact
  // address, so both sides agree without re-deriving it.
  string raft_bind_addr = 15;
}

// ---------------------------------------------------------------------------
// Agent sync (agent-initiated bidi stream)
// ---------------------------------------------------------------------------

service AgentSyncService {
  rpc Sync(stream AgentMessage) returns (stream ControlMessage);
}

message AgentMessage {
  oneof body {
    AgentHello hello = 1; // first message on every (re)connect
    Heartbeat heartbeat = 2;
    StatusBatch status = 3;
    AssignmentsAck ack = 4;
  }
}

message AgentHello {
  string node_id = 1;
  string binary_version = 2;
  // Agent's current assignment-set version, so control can skip a resend if
  // nothing changed across a reconnect.
  uint64 assignment_version = 3;
}

// Heartbeat carries ephemeral live data → leader `livestate` (never Raft).
message Heartbeat {
  google.protobuf.Timestamp time = 1;
  double cpu_percent = 2;
  uint64 memory_used_bytes = 3;
  uint64 memory_total_bytes = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  // Per-instance live samples, keyed by assignment id.
  map<string, InstanceSample> instances = 7;
  // Proxy counters for autoscaling/activation, keyed by environment id.
  map<string, ProxySample> proxy = 8;
}

message InstanceSample {
  double cpu_percent = 1;
  uint64 memory_bytes = 2;
  uint64 net_rx_bytes = 3;
  uint64 net_tx_bytes = 4;
}

message ProxySample {
  uint32 inflight = 1;
  double rps = 2;
  double error_rate = 3;
  double latency_p50_ms = 4;
  double latency_p99_ms = 5;
  google.protobuf.Timestamp last_request_at = 6; // idle tracking for scale-to-zero
}

// StatusBatch reports durable instance state transitions; control debounces
// and commits them via SetAssignmentsObserved.
message StatusBatch {
  map<string, zattera.v1.AssignmentObserved> observed = 1; // assignment id → observed
}

message AssignmentsAck {
  uint64 version = 1;
}

message ControlMessage {
  oneof body {
    AssignmentSet assignments = 1;
    ActivateService activate = 2; // scale-to-zero wake handled via scheduler; informational
  }
}

// AssignmentSet is the FULL desired set for this node (idempotent; no deltas).
message AssignmentSet {
  uint64 version = 1;
  repeated zattera.v1.Assignment assignments = 2;
  // Per-assignment runtime payload the control stream handler resolves at push
  // time — the release image, the frozen ServiceSpec and the DECRYPTED env —
  // keyed by assignment id. This never persists in Raft (env is secret and the
  // rest is re-resolvable from the release); it lives only in stream frames.
  map<string, AssignmentRuntime> runtime = 3;
}

// AssignmentRuntime carries everything the agent needs to materialize a
// container that the Assignment itself (release_id only) does not.
message AssignmentRuntime {
  string image_ref = 1;
  zattera.v1.ServiceSpec spec = 2;
  map<string, string> env = 3; // decrypted; stream-only, never persisted
  // Per-(project,env,node) Docker bridge subnet the agent attaches the
  // container to (T-46); control fills it from the NetworkAllocation.
  string subnet_cidr = 4;
  // Fencing lease for the assignment's volume(s) (T-62, spec §9.1). Control
  // sets it for stateful+volume assignments; the agent refuses to start the
  // container unless the lease names this node — the guard against a double-run
  // during a partition.
  zattera.v1.VolumeLease volume_lease = 5;
}

message ActivateService {
  string environment_id = 1;
}

// ---------------------------------------------------------------------------
// Agent-local service (served by every node on its mesh IP; control dials in)
// ---------------------------------------------------------------------------

service AgentLocalService {
  rpc QueryLogs(zattera.v1.LogQuery) returns (stream zattera.v1.LogLine);
  rpc Exec(stream AgentExecInput) returns (stream AgentExecOutput);
  rpc Top(AgentTopRequest) returns (AgentTopResponse);
  rpc Stats(zattera.v1.StatsQuery) returns (zattera.v1.StatsResponse);
  rpc ProxyTCP(stream TCPChunk) returns (stream TCPChunk); // port-forward leg

  // Builds (only meaningful on builder=true nodes):
  rpc RunBuild(RunBuildRequest) returns (stream BuildEvent);
  rpc CancelBuild(CancelBuildRequest) returns (CancelBuildResponse);

  // Volume data-path operations (executed on the volume's pinned node):
  rpc SnapshotVolume(AgentSnapshotVolumeRequest) returns (stream VolumeOpProgress);
  rpc RestoreVolume(AgentRestoreVolumeRequest) returns (stream VolumeOpProgress);
  rpc ListVolumeFiles(AgentListFilesRequest) returns (AgentListFilesResponse);
  rpc ReadVolumeFile(AgentReadFileRequest) returns (stream TCPChunk);
  rpc WriteVolumeFile(stream AgentWriteFileChunk) returns (AgentWriteFileResponse);
  // RemoveVolume deletes the named docker volume on this node (T-62 DeleteVolume
  // cleanup; best effort — the control plane ignores failures).
  rpc RemoveVolume(AgentRemoveVolumeRequest) returns (AgentRemoveVolumeResponse);
}

message AgentRemoveVolumeRequest {
  string environment_id = 1;
  string volume_name = 2; // logical name; the agent derives the docker volume name
}

message AgentRemoveVolumeResponse {}

message AgentExecInput {
  AgentExecStart start = 1; // first message only
  bytes stdin = 2;
  AgentTerminalSize resize = 3;
}

message AgentExecStart {
  string container_id = 1;
  repeated string command = 2;
  bool tty = 3;
  AgentTerminalSize initial_size = 4;
}

message AgentTerminalSize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message AgentExecOutput {
  bytes stdout = 1;
  bytes stderr = 2;
  bool exited = 3;
  int32 exit_code = 4;
}

message AgentTopRequest {
  string container_id = 1;
}

message AgentTopResponse {
  repeated string titles = 1;
  repeated AgentTopProcess processes = 2;
}

message AgentTopProcess {
  repeated string fields = 1;
}

message TCPChunk {
  bytes data = 1;
  // First chunk of a ProxyTCP stream sets the dial target:
  string dial_addr = 2; // "containerIP:port" or "meshIP:port"
}

message RunBuildRequest {
  zattera.v1.Build build = 1;
  // Where to fetch the source tarball from (control-plane blob URL) or a git
  // clone spec for GitHub builds.
  string source_url = 2;
  GitSource git = 3;
  string push_image_ref = 4; // full ref in the embedded registry
  string registry_username = 5;
  string registry_password = 6;
  map<string, string> build_args = 7;
  map<string, string> build_env = 8; // e.g. NIXPACKS_* hints
}

message GitSource {
  string clone_url = 1;   // https URL
  string access_token = 2; // short-lived GitHub installation token
  string ref = 3;
}

message BuildEvent {
  zattera.v1.LogLine log = 1;
  zattera.v1.BuildStatus status = 2; // sent on transitions
  string image_digest = 3;           // set on success
  string error = 4;
  // OCI platforms the image was actually built for (set on success). Resolves
  // an empty requested list to the builder's native platform (T-88).
  repeated string platforms = 5;
}

message CancelBuildRequest {
  string build_id = 1;
}

message CancelBuildResponse {
  bool canceled = 1;
}

message AgentSnapshotVolumeRequest {
  zattera.v1.Volume volume = 1;
  zattera.v1.VolumeSnapshot snapshot = 2;
  string pre_hook_container_id = 3; // run pre-hook here if set
  string pre_hook_command = 4;
  S3Target s3 = 5;
}

message AgentRestoreVolumeRequest {
  zattera.v1.Volume volume = 1;
  string manifest_key = 2;
  S3Target s3 = 3;
}

message S3Target {
  string endpoint = 1;
  string bucket = 2;
  string prefix = 3;
  string region = 4;
  string access_key = 5;
  string secret_key = 6;
  bytes data_key = 7; // cluster data key for chunk encryption (mTLS-protected hop)
}

message VolumeOpProgress {
  uint64 bytes_done = 1;
  uint64 bytes_total = 2;
  string phase = 3; // "hooks" | "scan" | "upload" | "download" | "done"
  string error = 4;
  string manifest_key = 5; // set when done (snapshot)
}

message AgentListFilesRequest {
  string environment_id = 1;
  string volume_name = 2; // logical name; the agent derives the docker volume name
  string path = 3;
}

message AgentListFilesResponse {
  repeated AgentFileInfo files = 1;
  bool truncated = 2; // directory had more entries than the cap
}

message AgentFileInfo {
  string name = 1;
  bool dir = 2;
  uint64 size_bytes = 3;
  int64 mod_time_unix_ms = 4;
  string mode = 5;
}

message AgentReadFileRequest {
  string environment_id = 1;
  string volume_name = 2; // logical name; the agent derives the docker volume name
  string path = 3;
}

message AgentWriteFileChunk {
  AgentWriteFileHeader header = 1; // first chunk only
  bytes data = 2;
}

message AgentWriteFileHeader {
  string volume_docker_name = 1;
  string path = 2;
  uint32 mode = 3;
}

message AgentWriteFileResponse {
  uint64 bytes_written = 1;
}
