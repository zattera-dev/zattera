syntax = "proto3";

// Mesh coordination (ADR-0003). Served by control nodes; nodes keep a
// long-lived WatchPeers stream and re-open it on control failover.

package zattera.cluster.v1;

import "google/protobuf/timestamp.proto";

service MeshService {
  // WatchPeers streams the full peer set on every change (no deltas).
  rpc WatchPeers(WatchPeersRequest) returns (stream PeerSet);
  // ReportObservedEndpoint: disco/STUN-lite result — control records the UDP
  // source address it observed for a node and folds it into PeerSets.
  rpc ReportObservedEndpoint(ReportObservedEndpointRequest) returns (ReportObservedEndpointResponse);
  // PunchStream: a meshsock-capable node keeps this open so control can push
  // PunchCommands to it (the "punch now" half of a coordinated simultaneous
  // open). Holding the stream also marks the node punch-capable. (T-57)
  rpc PunchStream(PunchStreamRequest) returns (stream PunchCommand);
  // RequestPunch coordinates a hole punch with a target node: control pushes a
  // PunchCommand to the target over its PunchStream and returns the target's
  // endpoints + the shared punch time to the requester. coordinated=false when
  // the target has no PunchStream (kernel-WG or offline) — the caller keeps the
  // hub/relay path. (T-57)
  rpc RequestPunch(RequestPunchRequest) returns (RequestPunchResponse);
}

message WatchPeersRequest {
  string node_id = 1;
}

// PeerSet is the complete WireGuard peer configuration for one node.
message PeerSet {
  uint64 version = 1;
  repeated Peer peers = 2;
  // Phase A hub-and-spoke: if true, this node routes the whole mesh CIDR via
  // its control peers instead of per-peer /32 AllowedIPs.
  bool hub_and_spoke = 3;
  // Node id of the current raft leader ("" during an election). A worker targets
  // its AgentSync stream at the leader — livestate/heartbeats are leader-memory,
  // so a stream landing on a follower would never mark the worker ALIVE (T-55c).
  string leader_node_id = 4;
}

message Peer {
  string node_id = 1;
  string wireguard_public_key = 2;
  string mesh_ip = 3;
  // Candidate "host:port" UDP endpoints, best first (configured public
  // endpoints, then disco-observed reflexive addresses).
  repeated string endpoints = 4;
  uint32 persistent_keepalive_seconds = 5; // 25 for NAT'd nodes, 0 otherwise
  bool is_control = 6;
  // AllowedIPs for this peer. Usually ["<mesh_ip>/32"]; control peers in
  // hub-and-spoke mode carry ["10.90.0.0/16"].
  repeated string allowed_ips = 7;
  bool relay_capable = 8; // Phase D: peer runs a TCP relay
}

message ReportObservedEndpointRequest {
  string node_id = 1;
  string observed_endpoint = 2; // "ip:port" seen by the disco echo listener
  google.protobuf.Timestamp observed_at = 3;
}

message ReportObservedEndpointResponse {
  bool accepted = 1;
}

message PunchStreamRequest {
  string node_id = 1;
}

// PunchCommand tells the receiver to burst probes at `peer` (the node that
// requested a punch with it) at time `punch_at`. Both sides bursting inside the
// same window is what opens the NAT holes.
message PunchCommand {
  string peer_node_id = 1;
  repeated string peer_endpoints = 2; // "ip:port" candidates to punch toward
  google.protobuf.Timestamp punch_at = 3;
}

message RequestPunchRequest {
  string node_id = 1;        // the requester (from mTLS identity; cross-checked)
  string target_node_id = 2; // who to punch with
}

message RequestPunchResponse {
  bool coordinated = 1;                // false: target not punch-capable
  repeated string target_endpoints = 2; // the target's "ip:port" candidates
  google.protobuf.Timestamp punch_at = 3;
}
