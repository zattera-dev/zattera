syntax = "proto3";

// FSM contract (ADR-0004). Every Raft log entry is one marshaled Command.
// RULES (frozen — violating these corrupts mixed-version clusters):
//   - NEVER change or reuse a field number, in this file or in any message
//     reachable from it.
//   - New mutations are ADDED to the oneof with a new number.
//   - Apply handlers must be deterministic: no clocks, no randomness, no I/O.
//     Timestamps and ULIDs are generated by the proposer and travel in the
//     command.

package zattera.cluster.v1;

import "google/protobuf/timestamp.proto";
import "zattera/v1/alert.proto";
import "zattera/v1/app.proto";
import "zattera/v1/auth.proto";
import "zattera/v1/common.proto";
import "zattera/v1/deploy.proto";
import "zattera/v1/domain.proto";
import "zattera/v1/job.proto";
import "zattera/v1/node.proto";
import "zattera/v1/project.proto";
import "zattera/v1/volume.proto";

// Command is the Raft log entry envelope.
message Command {
  // ULID generated by the proposer; used for idempotency (a retried Apply of
  // the same request_id is a no-op) and correlation.
  string request_id = 1;
  // Actor for audit: user id, "node:<id>" or "system:<component>".
  string actor = 2;
  // Proposal wall-clock time; Apply handlers use this instead of time.Now().
  google.protobuf.Timestamp time = 3;

  oneof mutation {
    // --- org / users / projects (100-119) ---
    PutOrg put_org = 100;
    PutUser put_user = 101;
    DeleteByID delete_user = 102;
    PutProject put_project = 103;
    DeleteByID delete_project = 104;
    PutProjectMember put_project_member = 105;
    DeleteProjectMember delete_project_member = 106;

    // --- apps / environments / env vars (120-139) ---
    PutApp put_app = 120;
    DeleteByID delete_app = 121;
    PutEnvironment put_environment = 122;
    DeleteByID delete_environment = 123;
    SetEnvVars set_env_vars = 124;

    // --- releases / deployments / builds (140-159) ---
    PutRelease put_release = 140;
    PutDeployment put_deployment = 141;
    SetDeploymentPhase set_deployment_phase = 142;
    PromoteRelease promote_release = 143;
    PutBuild put_build = 144;
    DeleteByID delete_release = 145; // release retention GC (T-38)

    // --- nodes / join / assignments (160-179) ---
    PutNode put_node = 160;
    DeleteByID delete_node = 161;
    SetNodeStatus set_node_status = 162;
    PutJoinToken put_join_token = 163;
    ConsumeJoinToken consume_join_token = 164;
    PutAssignments put_assignments = 165;
    DeleteAssignments delete_assignments = 166;
    SetAssignmentsObserved set_assignments_observed = 167;

    // --- auth (180-189) ---
    PutToken put_token = 180;
    DeleteByID delete_token = 181;
    TouchTokens touch_tokens = 182;
    PutClusterKeyMaterial put_cluster_key_material = 183;

    // --- domains / certs / dns (190-209) ---
    PutDomain put_domain = 190;
    DeleteByID delete_domain = 191;
    PutKV put_kv = 192; // certmagic storage + small internal KV (CAS-capable)
    DeleteKV delete_kv = 193;
    PutDNSProvider put_dns_provider = 194;
    DeleteByID delete_dns_provider = 195;

    // --- volumes / backup (210-229) ---
    PutVolume put_volume = 210;
    DeleteByID delete_volume = 211;
    PutVolumeLease put_volume_lease = 212;
    PutVolumeSnapshot put_volume_snapshot = 213;
    PutBackupConfig put_backup_config = 214;
    PutBackupRecord put_backup_record = 215;
    PutNetworkAllocation put_network_allocation = 216;
    PutServiceVIP put_service_vip = 217;

    // --- jobs (230-239) ---
    PutJob put_job = 230;

    // --- alerts / events / audit (240-259) ---
    PutAlertRule put_alert_rule = 240;
    DeleteByID delete_alert_rule = 241;
    PutNotificationChannel put_notification_channel = 242;
    DeleteByID delete_notification_channel = 243;
    AppendEvents append_events = 244;
    AppendAudit append_audit = 245;
  }
}

// Generic delete-by-ULID for resources without extra semantics.
message DeleteByID {
  string id = 1;
}

message PutOrg {
  zattera.v1.Org org = 1;
}

message PutUser {
  zattera.v1.User user = 1;
}

message PutProject {
  zattera.v1.Project project = 1;
}

message PutProjectMember {
  zattera.v1.ProjectMember member = 1;
}

message DeleteProjectMember {
  string project_id = 1;
  string user_id = 2;
}

message PutApp {
  zattera.v1.App app = 1;
}

message PutEnvironment {
  zattera.v1.Environment environment = 1;
}

message SetEnvVars {
  string environment_id = 1;
  map<string, zattera.v1.EncryptedValue> set = 2;
  repeated string unset = 3;
}

message PutRelease {
  zattera.v1.Release release = 1;
}

message PutDeployment {
  zattera.v1.Deployment deployment = 1;
}

message SetDeploymentPhase {
  string deployment_id = 1;
  zattera.v1.DeploymentPhase phase = 2;
  string error = 3;
  google.protobuf.Timestamp promoted_at = 4;
  google.protobuf.Timestamp drain_deadline = 5;
}

// PromoteRelease is THE red/green traffic switch: sets the environment's
// active_release_id and bumps route_generation in one deterministic step.
message PromoteRelease {
  string environment_id = 1;
  string release_id = 2;
  string deployment_id = 3;
}

message PutBuild {
  zattera.v1.Build build = 1;
}

message PutNode {
  zattera.v1.Node node = 1;
}

// SetNodeStatus batches durable node liveness transitions (leader-judged).
message SetNodeStatus {
  string node_id = 1;
  zattera.v1.NodeStatus status = 2;
  google.protobuf.Timestamp last_heartbeat_at = 3;
  bool schedulable_set = 4; // if true, also apply `schedulable`
  bool schedulable = 5;
}

message PutJoinToken {
  zattera.v1.JoinToken token = 1;
}

message ConsumeJoinToken {
  string token_id = 1;
}

message PutAssignments {
  repeated zattera.v1.Assignment assignments = 1;
}

message DeleteAssignments {
  repeated string assignment_ids = 1;
}

// SetAssignmentsObserved batches agent-reported instance status transitions
// (one command per node per ~2s max — keeps Raft log volume trivial).
message SetAssignmentsObserved {
  string node_id = 1;
  map<string, zattera.v1.AssignmentObserved> observed = 2; // assignment id → observed
}

message PutToken {
  zattera.v1.Token token = 1;
}

// TouchTokens batches last_used_at updates (flushed periodically, not per call).
message TouchTokens {
  map<string, google.protobuf.Timestamp> last_used = 1; // token id → time
}

message PutClusterKeyMaterial {
  zattera.v1.ClusterKeyMaterial material = 1;
}

message PutDomain {
  zattera.v1.Domain domain = 1;
}

// PutKV is a small replicated KV used by the certmagic storage adapter
// (keys prefixed "certmagic/") and for internal locks (TTL via expires_at).
// CAS: if expected_version >= 0, the apply fails unless the current version
// matches (version 0 = key absent).
message PutKV {
  string key = 1;
  bytes value = 2;
  int64 expected_version = 3; // -1 = unconditional
  google.protobuf.Timestamp expires_at = 4; // zero = no expiry
}

message DeleteKV {
  string key = 1;
  int64 expected_version = 2; // -1 = unconditional
}

message PutDNSProvider {
  zattera.v1.DNSProviderConfig provider = 1;
}

message PutVolume {
  zattera.v1.Volume volume = 1;
}

message PutVolumeLease {
  string volume_id = 1;
  zattera.v1.VolumeLease lease = 2; // nil lease releases
}

message PutVolumeSnapshot {
  zattera.v1.VolumeSnapshot snapshot = 1;
}

message PutBackupConfig {
  zattera.v1.BackupConfig config = 1;
}

message PutBackupRecord {
  zattera.v1.BackupRecord record = 1;
}

// PutNetworkAllocation records the per-(project,env,node) Docker bridge
// subnet (design §2.8).
message PutNetworkAllocation {
  string project_id = 1;
  string environment_id = 2;
  string node_id = 3;
  string subnet_cidr = 4; // "" deletes the allocation
}

// PutServiceVIP records the cluster-wide VIP for <app>.<env>.<project>.internal.
message PutServiceVIP {
  string environment_id = 1;
  string vip = 2; // from 10.97.0.0/16; "" deletes
}

message PutJob {
  zattera.v1.Job job = 1;
}

message PutAlertRule {
  zattera.v1.AlertRule rule = 1;
}

message PutNotificationChannel {
  zattera.v1.NotificationChannel channel = 1;
}

message AppendEvents {
  repeated zattera.v1.Event events = 1;
}

message AppendAudit {
  repeated zattera.v1.AuditEntry entries = 1;
}

// ---------------------------------------------------------------------------
// Snapshot — the full FSM state, streamed to raft's snapshot store.
// ---------------------------------------------------------------------------

message KVEntry {
  string key = 1;
  bytes value = 2;
  int64 version = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message NetworkAllocation {
  string project_id = 1;
  string environment_id = 2;
  string node_id = 3;
  string subnet_cidr = 4;
}

message ServiceVIP {
  string environment_id = 1;
  string vip = 2;
}

message EnvVarEntry {
  string environment_id = 1;
  string key = 2;
  zattera.v1.EncryptedValue value = 3;
}

message Snapshot {
  uint64 fsm_index = 1; // raft index the snapshot was taken at

  zattera.v1.Org org = 10; // single-org model for now
  repeated zattera.v1.User users = 11;
  repeated zattera.v1.Project projects = 12;
  repeated zattera.v1.ProjectMember project_members = 13;
  repeated zattera.v1.App apps = 14;
  repeated zattera.v1.Environment environments = 15;
  repeated EnvVarEntry env_vars = 16;
  repeated zattera.v1.Release releases = 17;
  repeated zattera.v1.Deployment deployments = 18;
  repeated zattera.v1.Build builds = 19;
  repeated zattera.v1.Node nodes = 20;
  repeated zattera.v1.JoinToken join_tokens = 21;
  repeated zattera.v1.Assignment assignments = 22;
  repeated zattera.v1.Token tokens = 23;
  zattera.v1.ClusterKeyMaterial cluster_key_material = 24;
  repeated zattera.v1.Domain domains = 25;
  repeated KVEntry kv = 26;
  repeated zattera.v1.DNSProviderConfig dns_providers = 27;
  repeated zattera.v1.Volume volumes = 28;
  repeated zattera.v1.VolumeSnapshot volume_snapshots = 29;
  zattera.v1.BackupConfig backup_config = 30;
  repeated zattera.v1.BackupRecord backup_records = 31;
  repeated NetworkAllocation network_allocations = 32;
  repeated ServiceVIP service_vips = 33;
  repeated zattera.v1.Job jobs = 34;
  repeated zattera.v1.AlertRule alert_rules = 35;
  repeated zattera.v1.NotificationChannel notification_channels = 36;
  repeated zattera.v1.Event events = 37;      // ring-capped
  repeated zattera.v1.AuditEntry audit = 38;  // ring-capped
  repeated AppliedRequest applied_requests = 39;
}

// AppliedRequest supports request_id idempotency across snapshots (ring-capped).
message AppliedRequest {
  string request_id = 1;
  uint64 raft_index = 2;
}
