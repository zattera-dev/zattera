version: v2
modules:
  - path: api/proto
deps:
  - buf.build/googleapis/googleapis
lint:
  use:
    - STANDARD
  except:
    # Streams and requests reuse resource messages heavily; response-suffix pedantry hurts here.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - WIRE_JSON
